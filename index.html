<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Salma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initCanvas()">

    <canvas id="particleCanvas"></canvas>
    
    <div class="balloon-container">
        <div class="balloon pink"></div>
        <div class="balloon blue"></div>
        <div class="balloon yellow"></div>
    </div>

    <div id="lockScreen">
        <div class="lock-box">
            <h2>HBD Salma! 🎂</h2>
            <p>Klik untuk membuka kejutan...</p>
            <button class="unlock-btn" onclick="unlockSurprise()">BUKA KADO</button>
        </div>
    </div>

    <div class="main-wrapper" id="mainSurprise">
        <div class="cake-container">
            <div class="candle"><div class="flame"></div></div>
            <div class="cake-layer layer-bottom"></div>
            <div class="cake-layer layer-middle"></div>
            <div class="cake-layer layer-top"></div>
        </div>

        <div class="card-box">
            <h1>Selamat Ulang Tahun Salma! ✨</h1>
            <p>Semoga tahun ini jadi tahun paling manis buat kamu. Sehat selalu dan lancar semua impiannya!</p>
            <div class="wish-text">"Tetap jadi orang baik dan bahagia ya!"</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
